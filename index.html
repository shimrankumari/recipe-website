<!DOCTYPE html>
<html>
<head>
  <title>My Recipe Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🍲 My Recipe Hub</h1>
<div id="filters">
  <button onclick="filterRecipes('all')">All</button>
  <button onclick="filterRecipes('Indian')">Indian</button>
  <button onclick="filterRecipes('Italian')">Italian</button>
  <button onclick="filterRecipes('Bihari')">Bihari</button>
  <button onclick="filterRecipes('Maharashtrian')">Maharashtrian</button>
</div>
<input type="text" id="search" placeholder="Search recipe...">

<select id="category">
  <option value="all">All</option>
  <option value="Indian">Indian</option>
  <option value="Italian">Italian</option>
  <option value="Bihari">Bihari</option>
  <option value="Maharashtrian">Maharashtrian</option>
</select>

<div id="recipes"></div>

<script type="module" src="script.js"></script>

</body>
</html>
